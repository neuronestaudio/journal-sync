<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / theme -->
  <meta name="theme-color" content="#182818" />
  <meta name="description" content="Journal Sync — Daily reflections, offline-first, syncs to Google Sheets" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Journal" />

  <title>Journal Sync</title>

  <link rel="stylesheet"   href="styles.css" />
  <link rel="manifest"     href="manifest.json" />
  <link rel="icon"         type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
</head>
<body>

  <!-- ── Sticky header ──────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="app-logo" aria-hidden="true">📓</span>
        <h1>Journal Sync</h1>
      </div>
      <div class="header-badges">
        <span id="connectivity-badge" class="badge badge--online"
              aria-label="Connection status: Online">Online</span>
        <span id="sync-badge"         class="badge" hidden
              aria-label="Sync status"></span>
      </div>
    </div>
  </header>

  <!-- ── Status bar ─────────────────────────────────────────── -->
  <div class="status-bar" role="status" aria-live="polite" aria-atomic="false">
    <span id="unsynced-count" class="status-item" hidden>
      <span class="dot dot--warning" aria-hidden="true"></span>
      <span id="unsynced-number">0</span>&thinsp;unsynced
    </span>
    <span id="last-synced-label" class="status-item" hidden>
      Last synced:&nbsp;<time id="last-synced-time">—</time>
    </span>
  </div>

  <!-- ── Journal form ───────────────────────────────────────── -->
  <main class="journal-main">
    <form id="journal-form" novalidate autocomplete="off">

      <!-- Date · Day · Wake Time -->
      <section class="card" aria-label="Date and time">
        <div class="card-row card-row--two">
          <div class="field">
            <label class="field-label" for="date">Date</label>
            <input type="date" id="date" name="date" class="field-input"
                   required aria-required="true" />
          </div>
          <div class="field">
            <label class="field-label" for="day">Day</label>
            <input type="text" id="day" name="day" class="field-input"
                   readonly tabindex="-1" aria-readonly="true" />
          </div>
        </div>
        <div class="field" style="margin-top:12px;">
          <label class="field-label" for="wakeTime">Wake Time</label>
          <input type="time" id="wakeTime" name="wakeTime" class="field-input" />
        </div>
      </section>

      <!-- People · Activity -->
      <section class="card" aria-label="Daily activity">
        <div class="field">
          <label class="field-label" for="people">People</label>
          <textarea id="people" name="people" class="field-textarea field-textarea--activity" rows="2"
                    placeholder="Family, friends, colleagues, alone? Who mattered today?"></textarea>
        </div>

        <!-- Dynamic Activity List -->
        <div class="field" style="margin-top:12px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label class="field-label">Activity</label>
            <button type="button" id="add-activity-btn" class="btn-add-activity" title="Add activity">+ Add</button>
          </div>
          <div id="activities-container">
            <div class="activity-item">
              <textarea class="field-textarea field-textarea--activity activity-input" rows="2"
                     placeholder="Work, exercise, creative, learning, rest — what filled your day?"></textarea>
              <button type="button" class="btn-remove-activity" title="Remove activity" style="display: none;">✕</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Reflections -->
      <section class="card" aria-label="Reflections">
        <div class="field">
          <label class="field-label" for="highlight">What moved forward? / Highlights</label>
          <textarea id="highlight" name="highlight" class="field-textarea field-textarea--reflection" rows="3"
                    placeholder="Wins, breakthroughs, progress, or moments that mattered..."></textarea>
        </div>
        <div class="field" style="margin-top:12px;">
          <label class="field-label" for="mistakes">What I Learned / Growth</label>
          <textarea id="mistakes" name="mistakes" class="field-textarea field-textarea--reflection" rows="3"
                    placeholder="Key lessons, areas to improve, growth insights, or challenges overcome..."></textarea>
        </div>
        <div class="field" style="margin-top:12px;">
          <label class="field-label" for="insight">Insight</label>
          <textarea id="insight" name="insight" class="field-textarea field-textarea--reflection" rows="3"
                    placeholder="Realizations, patterns noticed, deeper understanding, or aha moments..."></textarea>
        </div>
        <div class="field" style="margin-top:12px;">
          <label class="field-label" for="gratefulFor">Grateful for…</label>
          <textarea id="gratefulFor" name="gratefulFor" class="field-textarea field-textarea--reflection" rows="2"
                    placeholder="People, moments, simple things, or unexpected blessings..."></textarea>
        </div>
      </section>

      <!-- Habit Tracking -->
      <section class="card" aria-label="Habits">
        <!-- Money (at top) -->
        <div class="habit-item habit-item--top">
          <label class="habit-label">
            <input type="checkbox" id="money" name="money" class="habit-check" />
            $ (money)
          </label>
          <input type="text" id="moneyNote" name="moneyNote" class="habit-note" placeholder="Amount spent or earned...">
        </div>

        <!-- Read & Meditation (standalone) -->
        <div class="habit-grid">
          <!-- Read (Intellectual) -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="intellectual" name="intellectual" class="habit-check" />
              Read
            </label>
            <input type="text" id="intellectualNote" name="intellectualNote" class="habit-note" placeholder="Title, topic, or key idea...">
          </div>

          <!-- Meditation -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="meditation" name="meditation" class="habit-check" />
              Meditation
            </label>
            <input type="text" id="meditationNote" name="meditationNote" class="habit-note" placeholder="Duration, type, or feeling...">
          </div>
        </div>

        <!-- ENERGY Group -->
        <div class="habit-divider">ENERGY</div>
        <div class="habit-grid">
          <!-- Hobby -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="hobby" name="hobby" class="habit-check habit--green" />
              Hobby
            </label>
            <input type="text" id="hobbyNote" name="hobbyNote" class="habit-note habit-note--energy" placeholder="What did you enjoy? Time spent...">
          </div>

          <!-- MJ -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="mj" name="mj" class="habit-check habit--green" data-dependent="per" />
              MJ
            </label>
            <input type="text" id="mjNote" name="mjNote" class="habit-note habit-note--energy" placeholder="Amount, time, experience...">
          </div>

          <!-- PER -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="per" name="per" class="habit-check habit--green" />
              PER
            </label>
            <input type="text" id="perNote" name="perNote" class="habit-note habit-note--energy" placeholder="Type, amount, mood...">
          </div>

          <!-- SCL -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="scl" name="scl" class="habit-check habit--green" />
              SCL
            </label>
            <input type="text" id="sclNote" name="sclNote" class="habit-note habit-note--energy" placeholder="Who, where, how long...">
          </div>

          <!-- FAM -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="fam" name="fam" class="habit-check habit--green" />
              FAM
            </label>
            <input type="text" id="famNote" name="famNote" class="habit-note habit-note--energy" placeholder="Who, activity, or note...">
          </div>
        </div>

        <!-- Fitness Group (2 columns) -->
        <div class="habit-divider">Fitness</div>
        <div class="habit-grid habit-grid--2col">
          <!-- Cardio -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="cardio" name="cardio" class="habit-check habit--blue" data-dependent="phys" />
              Cardio
            </label>
            <input type="text" id="cardioNote" name="cardioNote" class="habit-note habit-note--fitness" placeholder="Type, duration, intensity...">
          </div>

          <!-- Gym -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="gym" name="gym" class="habit-check habit--blue" data-dependent="phys" />
              Gym
            </label>
            <input type="text" id="gymNote" name="gymNote" class="habit-note habit-note--fitness" placeholder="Workout, sets, or how you felt...">
          </div>

          <!-- PHYS -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="phys" name="phys" class="habit-check habit--blue" />
              PHYS
            </label>
            <input type="text" id="physNote" name="physNote" class="habit-note habit-note--fitness" placeholder="Type of movement or activity...">
          </div>

          <!-- 3L Water -->
          <div class="habit-item">
            <label class="habit-label">
              <input type="checkbox" id="threeLWater" name="threeLWater" class="habit-check habit--blue" />
              3L Water
            </label>
            <input type="text" id="threeLWaterNote" name="threeLWaterNote" class="habit-note habit-note--fitness" placeholder="Actual amount or notes...">
          </div>
        </div>

        <!-- Black Magic Group -->
        <div class="habit-divider habit-divider--black">Black Magic</div>
        <div class="habit-grid">
          <!-- Toxic -->
          <div class="habit-item">
            <label class="habit-label habit-label--black">
              <input type="checkbox" id="toxic" name="toxic" class="habit-check habit--black" />
              Toxic
            </label>
            <input type="text" id="toxicNote" name="toxicNote" class="habit-note habit-note--black" placeholder="What, amount, or reflection...">
          </div>

          <!-- NOOTROPIC -->
          <div class="habit-item">
            <label class="habit-label habit-label--black">
              <input type="checkbox" id="nootropic" name="nootropic" class="habit-check habit--black" />
              NOOTROPIC
            </label>
            <input type="text" id="nootropicNote" name="nootropicNote" class="habit-note habit-note--black" placeholder="Type, dose, or effect...">
          </div>
        </div>
      </section>

      <!-- Actions -->
      <section class="card actions-card" aria-label="Save and sync">
        <div class="actions">
          <button type="submit" id="save-btn" class="btn btn--primary">
            <span class="btn-icon" aria-hidden="true">💾</span>
            Save Locally
          </button>
          <button type="button" id="sync-btn" class="btn btn--secondary">
            <span class="btn-icon" aria-hidden="true">🔄</span>
            Sync Now
          </button>
          <button type="button" id="lock-btn" class="btn btn--secondary">
            <span class="btn-icon" aria-hidden="true">🔓</span>
            Lock
          </button>
          <button type="button" id="clear-btn" class="btn btn--secondary">
            <span class="btn-icon" aria-hidden="true">🗑️</span>
            Clear
          </button>
        </div>
        <p id="form-message" class="form-message" role="alert" hidden></p>
      </section>

    </form>
  </main>

  <!-- Toast notification (assertive for immediate feedback) -->
  <div id="toast" class="toast"
       role="status" aria-live="assertive" aria-atomic="true"
       hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
